<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pdai</title>
    <style>
        /* ==========================================================================
           1. CSS Variables & Theme Definitions
           ========================================================================== */
        :root {
            --bg-base: #000000;
            --bg-surface: #0d0d0d;
            --bg-surface-hover: #161616;
            --border-color: #222222;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-color: #8bb9fe; /* Slate Blue Default */
            --danger-color: #ff5555;
            
            /* Clean, elegant, non-techy font stack */
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-mono: 'Courier New', monospace; /* Kept minimally for system status only */
            
            --transition-speed: 0.25s;
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
        }

        /* Lightweight Mode Override */
        body.lightweight * {
            animation: none !important;
            transition: none !important;
        }

        /* ==========================================================================
           2. Reset & Base Styles
           ========================================================================== */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: var(--font-sans);
            letter-spacing: -0.01em;
            line-height: 1.6;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ==========================================================================
           3. Splash Screen Animations & Layout
           ========================================================================== */
        #splash-screen {
            position: fixed;
            inset: 0;
            background-color: var(--bg-base);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-wrapper {
            display: flex;
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -0.05em;
            overflow: hidden;
            position: relative;
        }

        .letter-p {
            transform: translateY(-100%);
            animation: slideDown 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .letter-d {
            transform: translateY(100%);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .splash-greeting {
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
            opacity: 0;
            letter-spacing: 0.05em;
            animation: fadeIn 0.6s ease 1.1s forwards; 
        }

        @keyframes slideDown { to { transform: translateY(0); } }
        @keyframes slideUp { to { transform: translateY(0); } }
        @keyframes fadeIn { to { opacity: 1; } }

        /* ==========================================================================
           4. Main Layout & Header
           ========================================================================== */
        #app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-base);
            z-index: 10;
        }

        .app-title {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.03em;
        }

        .app-title span { color: var(--accent-color); }

        .icon-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.6rem;
            border-radius: 50%; /* Fully circular buttons for settings/close */
            transition: color var(--transition-speed), background var(--transition-speed);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            color: var(--text-main);
            background-color: var(--bg-surface);
        }

        .icon-btn svg { width: 20px; height: 20px; fill: currentColor; }

        /* ==========================================================================
           5. Chat Interface
           ========================================================================== */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 2rem 1.5rem;
            scroll-behavior: smooth;
        }

        .chat-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message-row {
            display: flex;
            width: 100%;
        }

        .message-row.user { justify-content: flex-end; }
        .message-row.ai { justify-content: flex-start; }

        .message-bubble {
            max-width: 80%;
            padding: 0.85rem 1.4rem;
            font-size: 0.95rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message-row.user .message-bubble {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: var(--radius-md) var(--radius-md) 4px var(--radius-md); /* Elegant organic rounding */
        }

        .message-row.ai .message-bubble {
            background-color: transparent;
            border-left: 2px solid var(--accent-color);
            padding-left: 1.25rem;
            color: var(--text-main);
            border-radius: 0;
        }

        .loading-indicator {
            color: var(--text-muted);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .blink { animation: blink 1.2s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .message-bubble.error {
            border-left-color: var(--danger-color);
            color: var(--danger-color);
        }

        /* ==========================================================================
           6. Input Area
           ========================================================================== */
        footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border-color);
            background-color: var(--bg-base);
        }

        .input-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 0.75rem;
        }

        textarea {
            flex: 1;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 1rem 1.25rem;
            border-radius: var(--radius-md); /* Elegant rounded field */
            font-family: inherit;
            font-size: 0.95rem;
            resize: none;
            height: 56px;
            transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        textarea:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .send-btn {
            background-color: var(--accent-color);
            color: var(--bg-base);
            border: none;
            border-radius: var(--radius-md); /* Matching rounded action button */
            padding: 0 1.5rem;
            cursor: pointer;
            font-weight: 500;
            transition: opacity var(--transition-speed), background-color var(--transition-speed);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover { opacity: 0.9; }
        .send-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            background-color: var(--text-muted);
        }

        /* ==========================================================================
           7. Settings Modal
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background-color: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-speed) ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: var(--bg-base);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); /* Softened modal frame */
            width: 100%;
            max-width: 420px;
            padding: 2.25rem;
            transform: translateY(16px);
            transition: transform var(--transition-speed) cubic-bezier(0.16, 1, 0.3, 1);
        }

        .modal-overlay.active .modal-content { transform: translateY(0); }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .modal-header h2 { font-size: 1.2rem; font-weight: 500; letter-spacing: -0.02em; }

        .setting-group { margin-bottom: 1.75rem; }
        
        .setting-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
            font-weight: 500;
        }

        .form-control {
            width: 100%;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color var(--transition-speed);
        }
        
        .form-control:focus { outline: none; border-color: var(--accent-color); }

        /* Toggle Switch */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
        }

        .toggle-container .label-text {
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 42px;
            height: 24px;
        }

        .toggle-switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            transition: var(--transition-speed);
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px; width: 16px;
            left: 3px; bottom: 3px;
            background-color: var(--text-muted);
            transition: var(--transition-speed);
            border-radius: 50%;
        }

        input:checked + .slider { border-color: var(--accent-color); }
        input:checked + .slider:before {
            transform: translateX(18px);
            background-color: var(--accent-color);
        }

        /* Color Grid */
        .color-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 0.5rem;
        }
        
        .color-option {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform var(--transition-speed);
        }
        
        .color-option.active { border-color: var(--text-main); transform: scale(1.08); }

        .modal-credit {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .modal-credit a {
            color: inherit;
            text-decoration: none;
            transition: opacity var(--transition-speed);
        }

        .modal-credit a:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

    </style>
</head>

    <script>
        const defaultState = {
            name: "User",
            enterToSend: true,
            accentColor: "#8bb9fe",
            lightweight: false
        };

        let appState = JSON.parse(localStorage.getItem('pdai_settings')) || { ...defaultState };

        function saveState() {
            localStorage.setItem('pdai_settings', JSON.stringify(appState));
        }

        const UI = {
            splash: document.getElementById('splash-screen'),
            appContainer: document.getElementById('app-container'),
            chatHistory: document.getElementById('chat-history'),
            chatViewport: document.getElementById('chat-viewport'),
            input: document.getElementById('chat-input'),
            btnSend: document.getElementById('btn-send'),
            modal: document.getElementById('settings-modal'),
            btnOpenSettings: document.getElementById('btn-open-settings'),
            btnCloseSettings: document.getElementById('btn-close-settings'),
            inpName: document.getElementById('pref-name'),
            inpEnterSend: document.getElementById('pref-enter-send'),
            inpLightweight: document.getElementById('pref-lightweight'),
            colorOptions: document.querySelectorAll('.color-option')
        };

        function initApp() {
            applySettingsToUI();
            const splashDuration = 2400; 

            setTimeout(() => {
                UI.splash.style.opacity = '0';
                UI.appContainer.style.opacity = '1';
                setTimeout(() => {
                    UI.splash.style.display = 'none';
                    UI.input.focus();
                }, 500);
            }, splashDuration);
        }

        function applySettingsToUI() {
            document.documentElement.style.setProperty('--accent-color', appState.accentColor);
            
            if (appState.lightweight) {
                document.body.classList.add('lightweight');
            } else {
                document.body.classList.remove('lightweight');
            }

            UI.inpName.value = appState.name;
            UI.inpEnterSend.checked = appState.enterToSend;
            UI.inpLightweight.checked = appState.lightweight;

            UI.colorOptions.forEach(opt => {
                opt.classList.remove('active');
                if (opt.dataset.color === appState.accentColor) {
                    opt.classList.add('active');
                }
            });
        }

        UI.btnOpenSettings.addEventListener('click', () => UI.modal.classList.add('active'));
        UI.btnCloseSettings.addEventListener('click', () => UI.modal.classList.remove('active'));
        UI.modal.addEventListener('click', (e) => {
            if (e.target === UI.modal) UI.modal.classList.remove('active');
        });

        UI.inpName.addEventListener('input', (e) => {
            appState.name = e.target.value.trim() || defaultState.name;
            saveState();
        });

        UI.inpEnterSend.addEventListener('change', (e) => {
            appState.enterToSend = e.target.checked;
            saveState();
        });

        UI.inpLightweight.addEventListener('change', (e) => {
            appState.lightweight = e.target.checked;
            applySettingsToUI();
            saveState();
        });

        UI.colorOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                appState.accentColor = opt.dataset.color;
                applySettingsToUI();
                saveState();
            });
        });

        UI.input.addEventListener('keydown', (e) => {
            if (appState.enterToSend && e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        UI.btnSend.addEventListener('click', handleSend);
        
        function scrollToBottom() {
            UI.chatViewport.scrollTop = UI.chatViewport.scrollHeight;
        }

        function createMessageElement(role, text, isError = false) {
            const row = document.createElement('div');
            row.className = `message-row ${role}`;
            const bubble = document.createElement('div');
            bubble.className = `message-bubble ${isError ? 'error' : ''}`;
            bubble.textContent = text;
            row.appendChild(bubble);
            return row;
        }

        function createLoadingElement() {
            const row = document.createElement('div');
            row.className = 'message-row ai';
            row.id = 'loading-indicator-row';
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.style.borderLeftColor = 'transparent';
            bubble.innerHTML = `<span class="loading-indicator">Processing<span class="blink">...</span></span>`;
            row.appendChild(bubble);
            return row;
        }

        async function handleSend() {
            const text = UI.input.value.trim();
            if (!text) return;

            UI.chatHistory.appendChild(createMessageElement('user', text));
            UI.input.value = '';
            UI.input.disabled = true;
            UI.btnSend.disabled = true;
            scrollToBottom();

            const loadingEl = createLoadingElement();
            UI.chatHistory.appendChild(loadingEl);
            scrollToBottom();

            const suffix = `\n\n[System Note: Answer to the user like his name is ${appState.name}]`;
            const finalPrompt = text + suffix;
            const encodedPrompt = encodeURIComponent(finalPrompt);
            const endpoint = `https://ai.pidi.workers.dev/?ask=${encodedPrompt}`;

            try {
                const response = await fetch(endpoint, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json, text/plain, */*' }
                });

                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                let responseText = await response.text();
                
                try {
                    const jsonObj = JSON.parse(responseText);
                    if (jsonObj.choices && jsonObj.choices.length > 0 && jsonObj.choices[0].message) {
                        responseText = jsonObj.choices[0].message.content;
                    } else {
                        responseText = jsonObj.response || jsonObj.answer || jsonObj.text || responseText;
                    }
                } catch (e) {}

                loadingEl.remove();
                UI.chatHistory.appendChild(createMessageElement('ai', responseText.trim()));

            } catch (error) {
                loadingEl.remove();
                UI.chatHistory.appendChild(createMessageElement('ai', 'ERR_CONNECTION: Connection failed.', true));
            } finally {
                UI.input.disabled = false;
                UI.btnSend.disabled = false;
                UI.input.focus();
                scrollToBottom();
            }
        }

        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
